{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeTracker</title>
    <link rel="stylesheet" href="{% static 'tracker/css/main.css' %}">
</head>
<body>

<nav>
    <div class="brand">LifeScore™</div>
    <div class="nav-links">
        <a href="{% url 'dashboard' %}">📊 Dashboard</a>
        <a href="{% url 'registrar_actividad' %}">➕ Registrar</a>
        <a href="{% url 'gestionar_areas' %}">⚙️ Áreas</a>
        <form method="POST" action="{% url 'logout' %}" style="display:inline;">
            {% csrf_token %}
            <button type="submit" style="background:none; border:none; color:#5a6080; font-size:13px; cursor:pointer; font-family:inherit;">Salir</button>
        </form>
    </div>
</nav>

<div class="container">
    {% if messages %}
    <div class="messages">
        {% for message in messages %}
        <div class="message">{{ message }}</div>
        {% endfor %}
    </div>
    {% endif %}

    {% block content %}{% endblock %}
</div>

</body>
</html>
