{% extends 'tracker/base.html' %}

{% block content %}

<div class="label">REGISTRAR ACTIVIDAD</div>

<div class="card">
    <form method="POST">
        {% csrf_token %}

        <label style="font-size:11px; color:#5a6080; letter-spacing:1px;">ÁREA</label>
        <select name="area">
            {% for area in areas %}
            <option value="{{ area.pk }}">{{ area.emoji }} {{ area.nombre }}</option>
            {% empty %}
            <option disabled>Sin áreas — crea una primero</option>
            {% endfor %}
        </select>

        <label style="font-size:11px; color:#5a6080; letter-spacing:1px;">¿QUÉ HICISTE?</label>
        <input type="text" name="descripcion" placeholder="Ej: Completé el módulo 3 del bootcamp" required>

        <label style="font-size:11px; color:#5a6080; letter-spacing:1px;">PUNTOS</label>
        <div style="display:flex; gap:6px; margin-bottom:12px;">
            {% for val, label in puntos_choices %}
            <label style="flex:1; cursor:pointer;">
                <input type="radio" name="puntos" value="{{ val }}" {% if val == 3 %}checked{% endif %} style="display:none;">
                <div class="pts-btn" data-val="{{ val }}" style="
                    text-align:center; border:1px solid #252a40;
                    border-radius:8px; padding:8px 0; cursor:pointer;
                    font-size:12px; color:#5a6080;
                ">
                    <div style="font-size:18px; font-weight:700;">{{ val }}</div>
                    {{ label }}
                </div>
            </label>
            {% endfor %}
        </div>

        <button type="submit" class="btn" style="width:100%;">Registrar ✓</button>
    </form>
</div>

<a href="{% url 'dashboard' %}" class="btn btn-outline" style="display:block; text-align:center; margin-top:8px;">← Volver</a>

<script>
    document.querySelectorAll('input[name="puntos"]').forEach(radio => {
        radio.addEventListener('change', () => {
            document.querySelectorAll('.pts-btn').forEach(btn => {
                btn.style.borderColor = '#252a40';
                btn.style.color = '#5a6080';
            });
            const btn = radio.nextElementSibling;
            btn.style.borderColor = '#4F8EF7';
            btn.style.color = '#4F8EF7';
        });
    });
    // Activar el checked por defecto
    document.querySelector('input[name="puntos"]:checked').dispatchEvent(new Event('change'));
</script>

{% endblock %}
