{% extends 'tracker/base.html' %}

{% block content %}

<div style="max-width:340px; margin:40px auto;">
    <div style="text-align:center; margin-bottom:24px;">
        <div style="font-size:32px; font-weight:800; color:#4F8EF7; letter-spacing:-1px;">LifeScore™</div>
        <div style="font-size:11px; color:#5a6080; letter-spacing:2px; margin-top:4px;">TU PROGRESO DE VIDA</div>
    </div>

    <div class="card">
        <div class="label">INICIAR SESIÓN</div>
        <form method="POST">
            {% csrf_token %}
            <label style="font-size:11px; color:#5a6080; letter-spacing:1px;">USUARIO</label>
            <input type="text" name="username" autofocus required>
            <label style="font-size:11px; color:#5a6080; letter-spacing:1px;">CONTRASEÑA</label>
            <input type="password" name="password" required>
            {% if form.errors %}
            <div style="color:#F76B6B; font-size:12px; margin-bottom:10px;">
                Usuario o contraseña incorrectos.
            </div>
            {% endif %}
            <button type="submit" class="btn" style="width:100%; margin-top:4px;">Entrar →</button>
        </form>
    </div>
    <div style="text-align:center; margin-top:12px; font-size:12px; color:#5a6080;">
        ¿No tienes cuenta? <a href="{% url 'registro' %}" style="color:#4F8EF7;">Regístrate</a>
    </div>
</div>

{% endblock %}
